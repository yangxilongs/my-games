<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yangxilongs 的 HTML 游戏库</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        .subtitle { color: #7f8c8d; margin-bottom: 30px; }
        .game-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; width: 100%; max-width: 800px; }
        .game-card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-decoration: none; color: #2980b9; font-weight: bold; text-align: center; transition: all 0.2s ease; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; font-size: 1.1em; }
        .game-card:hover { transform: translateY(-5px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); background-color: #ebf5fb; color: #154360; }
        footer { margin-top: 60px; font-size: 0.85em; color: #bdc3c7; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>
    <h1>控制台：Abyss Walker 项目群</h1>
    <p class="subtitle">AI 编程逻辑实验作品集 - By Yangxilongs</p>

    <div class="game-list">
        <a href="./abyss-walker-v1.0/" class="game-card">🎮 深渊行者 v1.0</a>
        <a href="./abyss-walker-v2.2/" class="game-card">🎮 深渊行者 v2.2</a>
        </div>

    <footer>探索技术边际，保持逻辑严密</footer>
</body>
</html>
